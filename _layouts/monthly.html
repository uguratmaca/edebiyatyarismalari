---
layout: default
---
<section class="p-2">
	<h1>{% include dynamic-year.html text=page.title %}</h1>
	<hr>

	<section class="col justify-content-center">
		<span>{% include dynamic-year.html text=page.subline %}</span>
	</section>

	{% for post in site.posts %}
		{% if post.tags contains page.key %}
			{% include postdetail.html %}
		{% endif %}
	{% endfor %}
</section>
